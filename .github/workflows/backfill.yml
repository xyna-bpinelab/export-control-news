name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to backfill (bis / ofac / both)'
        required: false
        default: 'both'
      max_pages:
        description: 'Max pages per source (0 = unlimited)'
        required: false
        default: '0'

jobs:
  backfill-bis:
    name: Backfill BIS (Federal Register)
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.source == 'bis' || github.event.inputs.source == 'both'
    steps:
      - name: Run BIS backfill pages
        shell: bash
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: |
          page=1
          while true; do
            echo "Fetching BIS page $page..."
            response=$(curl -sL -X GET "${VERCEL_URL}/api/backfill/bis?page=${page}" \
              -H "Authorization: Bearer ${CRON_SECRET}")
            echo "Response: $response"
            echo "$response"
            has_more=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('has_more','false'))")
            inserted=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('inserted',0))")
            echo "  -> inserted: $inserted, has_more: $has_more"
            if [ "$has_more" != "True" ]; then break; fi
            if [ "$MAX_PAGES" != "0" ] && [ "$page" -ge "$MAX_PAGES" ]; then break; fi
            page=$((page + 1))
            sleep 2
          done
          echo "BIS backfill complete."

  backfill-ofac:
    name: Backfill OFAC Recent Actions
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.source == 'ofac' || github.event.inputs.source == 'both'
    steps:
      - name: Run OFAC backfill pages
        shell: bash
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          MAX_PAGES: ${{ github.event.inputs.max_pages }}
        run: |
          page=0
          count=0
          while true; do
            echo "Fetching OFAC page $page..."
            response=$(curl -sL -X GET "${VERCEL_URL}/api/backfill/ofac?page=${page}" \
              -H "Authorization: Bearer ${CRON_SECRET}")
            echo "Response: $response"
            echo "$response"
            has_more=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('has_more','false'))")
            inserted=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('inserted',0))")
            echo "  -> inserted: $inserted, has_more: $has_more"
            if [ "$has_more" != "True" ]; then break; fi
            count=$((count + 1))
            if [ "$MAX_PAGES" != "0" ] && [ "$count" -ge "$MAX_PAGES" ]; then break; fi
            page=$((page + 1))
            sleep 2
          done
          echo "OFAC backfill complete."
